.quadro-medieval{
position:relative;
display:inline-block;
padding:15px;
background:linear-gradient(135deg,#e0c27a,#8a6427,#d8b76a);
border:6px solid #4b2f14;

.quadro-medieval img{

}

.quadro-medieval::before,
.quadro-medieval::after{

font-size:28px;
color:#6b471d;
font-weight:bold;
transition:color 0.4s ease;
}

.quadro-medieval::before{
top:-10px;
left:-10px;

.quadro-medieval::after{

}

.menu-botoes{
margin-top:30px;

flex-direction:column;
align-items:center;
gap:16px;
}

.menu-botoes a{
border:4px solid #3F3F3F;
color:#3F3F3F;
display:inline-block;
font-size:18px;
font-weight:bold;
line-height:24px;
padding:12px 32px 12px 82px;
position:relative;
text-decoration:none;
background-color:rgba(255,255,255,0.75);
min-width:220px;
text-align:left;
box-sizing:border-box;
transition:background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
}

.menu-botoes a .label,
.menu-botoes a .icon-arrow{
backface-visibility:hidden;
transform:translateZ(0);
perspective:1000;
}

.menu-botoes a .label{
display:inline-block;
transition:transform .5s cubic-bezier(0.86, 0, 0.07, 1);
}

.menu-botoes a .icon-arrow{
fill:#3F3F3F;
height:15px;
top:17px;
transition:transform .5s cubic-bezier(0.86, 0, 0.07, 1), opacity .4s cubic-bezier(0.86, 0, 0.07, 1), fill 0.4s ease;
width:35px;
}

.menu-botoes a .icon-arrow.before{
left:32px;
margin-right:15px;
position:absolute;
transform-origin:left center;
}

.menu-botoes a .icon-arrow.after{
margin-left:15px;
opacity:0;
position:absolute;
right:32px;
transform:translateX(75%) scaleX(0.1);
transform-origin:right center;
}

.menu-botoes a:hover .label{
transform:translateX(-52px);
}

.menu-botoes a:hover .icon-arrow.before{
opacity:0;
transform:translateX(-75%) scaleX(0.1);
}

.menu-botoes a:hover .icon-arrow.after{
opacity:1;
transform:translateX(0) scaleX(1);
}

.menu-botoes a:active{
border-color:#FD6154;
color:#FD6154;
}

.menu-botoes a:active .icon-arrow{
fill:#FD6154;
}

.sem-resultado{

<script>
let idiomaAtual = "pt";

function alternarModoNoturno() {
    document.body.classList.toggle("dark-mode");
}

function alternarIdioma() {
    const titulo = document.getElementById("tituloPrincipal");
    const subtitulo = document.getElementById("subtitulo");
    const campoBusca = document.getElementById("campoBusca");
    const semResultado = document.getElementById("semResultado");
    const labelEmail = document.getElementById("labelEmail");
    const labelSenha = document.getElementById("labelSenha");
    const imagemCristo = document.getElementById("imagemCristo");
    const botaoGlobo = document.getElementById("botaoGlobo");
    const botaoNoturno = document.getElementById("botaoNoturno");
    const botaoMusica = document.getElementById("botaoMusica");
    const itens = document.querySelectorAll("#menuBotoes a");

    if (idiomaAtual === "pt") {
        document.documentElement.lang = "en";
        titulo.textContent = "Cathopedia";
        subtitulo.textContent = "The Roman Catholic encyclopedia";
        campoBusca.placeholder = "Search...";
        semResultado.textContent = "No results found.";
        labelEmail.textContent = "Email address";
        labelSenha.textContent = "Password";
        imagemCristo.alt = "Christ the King";
        botaoGlobo.title = "Translate to Portuguese";
        botaoNoturno.title = "Toggle dark mode";
        botaoMusica.title = musicaTocando ? "Pause music" : "Play music";

        itens.forEach(function(item) {
            item.querySelector(".label").textContent = item.getAttribute("data-nome-en");
        });

        idiomaAtual = "en";
    } else {
        document.documentElement.lang = "pt-BR";
        titulo.textContent = "Cathopedia";
        subtitulo.textContent = "A enciclopédia católica romana";
        campoBusca.placeholder = "Pesquisar...";
        semResultado.textContent = "Nenhum resultado encontrado.";
        labelEmail.textContent = "Email address";
        labelSenha.textContent = "Password";
        imagemCristo.alt = "Cristo Rei";
        botaoGlobo.title = "Traduzir para inglês";
        botaoNoturno.title = "Alternar modo noturno";
        botaoMusica.title = musicaTocando ? "Pausar música" : "Tocar música";

        itens.forEach(function(item) {
            item.querySelector(".label").textContent = item.getAttribute("data-nome-pt");
        });

        idiomaAtual = "pt";
    }

    filtrarMenu();
}

function filtrarMenu() {
    const input = document.getElementById("campoBusca");
    const filtro = input.value.toLowerCase();
    const menu = document.getElementById("menuBotoes");
    const itens = menu.getElementsByTagName("a");
    const mensagem = document.getElementById("semResultado");
    let encontrados = 0;

    for (let i = 0; i < itens.length; i++) {
        let nome;
        if (idiomaAtual === "pt") {
            nome = itens[i].getAttribute("data-nome-pt").toLowerCase();
        } else {
            nome = itens[i].getAttribute("data-nome-en").toLowerCase();
        }

        if (nome.indexOf(filtro) > -1) {
            itens[i].style.display = "inline-block";
            encontrados++;
        } else {
            itens[i].style.display = "none";
        }
    }

    if (encontrados === 0) {
        mensagem.style.display = "inline-block";
    } else {
        mensagem.style.display = "none";
    }
}

function selecionarPagina(numero) {
    const botoes = document.querySelectorAll("#paginacao .btn");
    botoes.forEach(function(botao) {
        botao.classList.remove("btn-active");
    });
    botoes[numero - 1].classList.add("btn-active");
}

let player;
let playerPronto = false;
let musicaTocando = false;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '1',
        width: '1',
        videoId: 'TWdSi0Xw4u0',
        playerVars: {
            autoplay: 0,
            controls: 0,
            disablekb: 1,
            fs: 0,
            modestbranding: 1,
            rel: 0
        },
        events: {
            'onReady': function() {
                playerPronto = true;
            }
        }
    });
}

function alternarMusica() {
    const botao = document.getElementById("botaoMusica");

    if (!playerPronto) {
        return;
    }

    if (!musicaTocando) {
        player.playVideo();
        musicaTocando = true;
        botao.classList.add("tocando");
        botao.title = idiomaAtual === "pt" ? "Pausar música" : "Pause music";
    } else {
        player.pauseVideo();
        musicaTocando = false;
        botao.classList.remove("tocando");
        botao.title = idiomaAtual === "pt" ? "Tocar música" : "Play music";
    }
}
</script>
