<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cathopedia</title>

<style>
body{
background-image:url("fundo.jpg");
background-repeat:repeat;
background-size:cover;
text-align:center;
font-family:Georgia,"Times New Roman",serif;
margin:0;
transition:background 0.4s ease, color 0.4s ease;
}

/* modo noturno */
body.dark-mode{
background-image:none;
background-color:#121212;
color:#f1f1f1;
}

body.dark-mode .titulo-principal{
color:#f0d9a0;
}

body.dark-mode .subtitulo{
color:#d0d0d0;
}

body.dark-mode .menu-botoes a{
border:4px solid #cfcfcf;
color:#f1f1f1;
background-color:rgba(30,30,30,0.85);
}

body.dark-mode .menu-botoes a .icon-arrow{
fill:#f1f1f1;
}

body.dark-mode .menu-botoes a:active{
border-color:#FD6154;
color:#FD6154;
}

body.dark-mode .menu-botoes a:active .icon-arrow{
fill:#FD6154;
}

body.dark-mode .quadro-medieval{
background:linear-gradient(135deg,#5f5f5f,#2b2b2b,#7c7c7c);
border:6px solid #d4af37;
outline:3px solid #8f7440;
box-shadow:10px 10px 18px rgba(0,0,0,0.7);
}

body.dark-mode .quadro-medieval img{
border:4px solid #777;
background-color:#222;
}

body.dark-mode .quadro-medieval::before,
body.dark-mode .quadro-medieval::after{
color:#d4af37;
}

/* cabeçalho no canto superior esquerdo */
.cabecalho{
position:fixed;
top:20px;
left:20px;
display:flex;
align-items:center;
gap:12px;
z-index:1000;
}

.cabecalho img{
width:45px;
}

.bloco-titulo{
display:flex;
flex-direction:column;
}

.titulo-principal{
font-size:36px;
color:#3b2a17;
margin:0;
line-height:1;
transition:color 0.4s ease;
}

.subtitulo{
font-size:13px;
color:#444;
white-space:nowrap;
margin-top:3px;
transition:color 0.4s ease;
}

/* botão modo noturno */
.botao-noturno{
position:fixed;
top:20px;
right:20px;
width:48px;
height:48px;
display:flex;
align-items:center;
justify-content:center;
background-color:rgba(255,255,255,0.8);
border:2px solid #3b2a17;
border-radius:50%;
cursor:pointer;
z-index:1000;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
transition:background-color 0.4s ease, border-color 0.4s ease, transform 0.2s ease;
}

.botao-noturno:hover{
transform:scale(1.08);
}

.botao-noturno svg{
width:22px;
height:22px;
color:#3b2a17;
transition:color 0.4s ease;
}

body.dark-mode .botao-noturno{
background-color:rgba(40,40,40,0.95);
border-color:#d4af37;
}

body.dark-mode .botao-noturno svg{
color:#f0d9a0;
}

/* imagem principal */
.imagem-jesus{
margin-top:120px;
}

.quadro-medieval{
position:relative;
display:inline-block;
padding:15px;
background:linear-gradient(135deg,#e0c27a,#8a6427,#d8b76a);
border:6px solid #4b2f14;
outline:3px solid #caa24d;
box-shadow:10px 10px 18px rgba(0,0,0,0.45);
transition:all 0.4s ease;
}

.quadro-medieval img{
width:300px;
display:block;
border:4px solid #efe2c2;
background-color:#f8f1e3;
transition:all 0.4s ease;
}

.quadro-medieval::before,
.quadro-medieval::after{
content:"✠";
position:absolute;
font-size:28px;
color:#6b471d;
font-weight:bold;
transition:color 0.4s ease;
}

.quadro-medieval::before{
top:-10px;
left:-10px;
}

.quadro-medieval::after{
bottom:-10px;
right:-10px;
}

/* área dos botões */
.menu-botoes{
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center;
gap:16px;
}

/* botões animados */
.menu-botoes a{
border:4px solid #3F3F3F;
color:#3F3F3F;
display:inline-block;
font-size:18px;
font-weight:bold;
line-height:24px;
padding:12px 32px 12px 82px;
position:relative;
text-decoration:none;
background-color:rgba(255,255,255,0.75);
min-width:220px;
text-align:left;
box-sizing:border-box;
transition:background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
}

.menu-botoes a .label,
.menu-botoes a .icon-arrow{
backface-visibility:hidden;
transform:translateZ(0);
perspective:1000;
}

.menu-botoes a .label{
display:inline-block;
transition:transform .5s cubic-bezier(0.86, 0, 0.07, 1);
}

.menu-botoes a .icon-arrow{
fill:#3F3F3F;
height:15px;
top:17px;
transition:transform .5s cubic-bezier(0.86, 0, 0.07, 1), opacity .4s cubic-bezier(0.86, 0, 0.07, 1), fill 0.4s ease;
width:35px;
}

.menu-botoes a .icon-arrow.before{
left:32px;
margin-right:15px;
position:absolute;
transform-origin:left center;
}

.menu-botoes a .icon-arrow.after{
margin-left:15px;
opacity:0;
position:absolute;
right:32px;
transform:translateX(75%) scaleX(0.1);
transform-origin:right center;
}

.menu-botoes a:hover .label{
transform:translateX(-52px);
}

.menu-botoes a:hover .icon-arrow.before{
opacity:0;
transform:translateX(-75%) scaleX(0.1);
}

.menu-botoes a:hover .icon-arrow.after{
opacity:1;
transform:translateX(0) scaleX(1);
}

.menu-botoes a:active{
border-color:#FD6154;
color:#FD6154;
}

.menu-botoes a:active .icon-arrow{
fill:#FD6154;
}
</style>
</head>
